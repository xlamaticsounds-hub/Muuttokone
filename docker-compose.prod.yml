# docker-compose.prod.yml
version: '3.8'

networks:
  network:
    driver: bridge

services:
  database:
    image: postgres:16.9
    networks: [network]
    container_name: prod-database
    restart: always
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: "muuttokone"
      POSTGRES_USER: "muuttokone_user"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-change_me_in_production}"

  directus:
    image: directus/directus:11.10.2
    networks: [network]
    container_name: prod-directus
    restart: always
    ports:
      - "8055:8055"
    volumes:
      - directus_uploads:/directus/uploads
      - directus_extensions:/directus/extensions
    depends_on:
      - database
    environment:
      SECRET: "${DIRECTUS_SECRET:-generate_strong_secret_here}"
      DB_CLIENT: "pg"
      DB_HOST: "database"
      DB_PORT: "5432"
      DB_DATABASE: "muuttokone"
      DB_USER: "muuttokone_user"
      DB_PASSWORD: "${POSTGRES_PASSWORD:-change_me_in_production}"
      ADMIN_EMAIL: "${ADMIN_EMAIL:-admin@muuttokone.fi}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-change_me_in_production}"
      PUBLIC_URL: "${DIRECTUS_PUBLIC_URL:-https://your-directus.up.railway.app}"
      DIRECTUS_PUBLIC_URL: "${DIRECTUS_PUBLIC_URL:-https://your-directus.up.railway.app}"

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    networks: [network]
    container_name: prod-frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - directus
    environment:
      NODE_ENV: "production"
      DIRECTUS_URL: "http://directus:8055"
      DATABASE_URL: "postgresql://muuttokone_user:${POSTGRES_PASSWORD:-change_me_in_production}@database:5432/muuttokone"
      SITE_URL: "${SITE_URL:-https://muuttokone.fi}"
      NEXTAUTH_URL: "${SITE_URL:-https://muuttokone.fi}"
      NEXTAUTH_SECRET: "${NEXTAUTH_SECRET:-generate_32_char_secret_here}"
      DIRECTUS_STATIC_TOKEN: "${DIRECTUS_STATIC_TOKEN:-get_from_directus_admin}"

volumes:
  postgres_data:
  directus_uploads:
  directus_extensions:
