name: Lint and Format

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install deps
        working-directory: ./apps/frontend
        run: npm ci
      - name: Run ESLint
        working-directory: ./apps/frontend
        run: npm run lint
      - name: Run Prettier check
        working-directory: ./apps/frontend
        run: npx prettier --check "**/*.{js,ts,tsx,json,css,md}" 
