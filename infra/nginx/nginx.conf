user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';
    access_log  /var/log/nginx/access.log  main;
    sendfile        on;
    keepalive_timeout  65;

    upstream directus_admin {
        server host.docker.internal:8055;
    }

    upstream frontend {
    # In this compose setup there is no "frontend" service container.
    # Route to the host machine's port 3000 so nginx in Docker can reach a local Next dev server.
    # On Linux use the host IP or add an extra_host mapping instead of host.docker.internal.
    server host.docker.internal:3000;
    }

    server {
        listen 80;
        server_name mgmt.muuttokone.fi;

        location / {
            proxy_pass http://directus_admin;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    server {
    # Make this the default server so requests by IP (or unresolved hostnames)
    # land on the frontend site instead of the first vhost.
    listen 80 default_server;
        server_name muuttokone.fi;

        location / {
            proxy_pass http://host.docker.internal:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}

